<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>💪 家庭健身管理看板</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gradient-to-br from-indigo-500 via-purple-500 to-pink-500 min-h-screen p-4 md:p-8">
    <div class="max-w-6xl mx-auto">
        <h1 class="text-3xl md:text-4xl font-bold text-white text-center mb-2">💪 家庭健身管理看板</h1>
        <p class="text-white/70 text-center mb-8" id="lastUpdate">数据加载中...</p>

        <div class="grid md:grid-cols-2 gap-6" id="dashboardContent">
            <!-- 数据将通过JS动态填充 -->
            <div class="text-white text-center py-12">正在加载数据...</div>
        </div>
    </div>

    <script>
        // 从JSON加载数据
        async function loadData() {
            try {
                const res = await fetch('./fitness-data.json?v=' + Date.now());
                const data = await res.json();
                renderDashboard(data);
                document.getElementById('lastUpdate').textContent = '最后更新: ' + data.lastUpdate;
            } catch (e) {
                console.error('加载失败', e);
                document.getElementById('dashboardContent').innerHTML = 
                    '<div class="text-white text-center col-span-2 py-12">数据加载失败，请刷新重试</div>';
            }
        }

        // 渲染看板
        function renderDashboard(data) {
            const today = new Date().toISOString().split('T')[0];
            const users = ['Hardy', 'Della'];
            const colors = { Hardy: 'from-blue-500 to-cyan-500', Della: 'from-pink-500 to-rose-500' };
            
            let html = '';
            
            users.forEach(userName => {
                // 今日体重
                const weightRecord = data['表1_每日体重记录'].find(r => r['日期'] === today && r['用户'] === userName);
                const weight = weightRecord ? weightRecord['体重'] : '-';
                
                // 今日饮食
                const foodRecords = data['表2_每日饮食记录'].filter(r => r['日期'] === today && r['用户'] === userName);
                const totalCalorie = foodRecords.reduce((sum, r) => sum + r['估算热量'], 0);
                const totalProtein = foodRecords.reduce((sum, r) => sum + r['估算蛋白质'], 0).toFixed(1);
                
                // 今日饮水
                const waterRecord = data['表4_每日饮水记录'].find(r => r['日期'] === today && r['用户'] === userName);
                const water = waterRecord ? waterRecord['饮水量'] : 0;
                
                // 目标
                const targets = data['表5_目标设置'][userName];
                const isTrainingDay = false; // 今天是非训练日
                const calorieTarget = isTrainingDay ? targets['训练日热量目标'] : targets['非训练日热量目标'];
                const proteinTarget = targets['每日蛋白质目标'];
                const waterTarget = targets['每日饮水目标'];
                const targetWeight = targets['目标体重'];
                
                // 减重进度
                const startWeight = userName === 'Hardy' ? 76 : 65;
                const progress = Math.max(0, Math.min(100, ((startWeight - weight) / (startWeight - targetWeight) * 100)));
                
                html += `
                <div class="bg-white rounded-2xl p-6 shadow-xl">
                    <div class="flex items-center gap-3 mb-6">
                        <div class="w-12 h-12 bg-gradient-to-r ${colors[userName]} rounded-full flex items-center justify-center text-2xl">
                            ${userName === 'Hardy' ? '👨' : '👩'}
                        </div>
                        <div>
                            <h2 class="text-xl font-bold text-gray-800">${userName}</h2>
                            <p class="text-gray-500 text-sm">${today}</p>
                        </div>
                    </div>

                    <!-- 体重卡片 -->
                    <div class="bg-gradient-to-r ${colors[userName]} rounded-xl p-4 text-white mb-4">
                        <div class="flex justify-between items-end">
                            <div>
                                <p class="text-white/70 text-sm">今日体重</p>
                                <p class="text-3xl font-bold">${weight} <span class="text-lg">kg</span></p>
                            </div>
                            <div class="text-right">
                                <p class="text-white/70 text-sm">目标 ${targetWeight} kg</p>
                                <p class="font-semibold">进度 ${Math.round(progress)}%</p>
                            </div>
                        </div>
                        <div class="w-full bg-white/30 rounded-full h-2 mt-3">
                            <div class="bg-white rounded-full h-2 transition-all" style="width: ${progress}%"></div>
                        </div>
                    </div>

                    <!-- 今日数据 -->
                    <div class="grid grid-cols-3 gap-3 mb-4">
                        <div class="bg-orange-50 rounded-lg p-3 text-center">
                            <p class="text-orange-600 text-xs">🔥 热量</p>
                            <p class="text-xl font-bold text-orange-700">${totalCalorie}</p>
                            <p class="text-orange-500 text-xs">/ ${calorieTarget} kcal</p>
                        </div>
                        <div class="bg-green-50 rounded-lg p-3 text-center">
                            <p class="text-green-600 text-xs">🥩 蛋白质</p>
                            <p class="text-xl font-bold text-green-700">${totalProtein}</p>
                            <p class="text-green-500 text-xs">/ ${proteinTarget} g</p>
                        </div>
                        <div class="bg-blue-50 rounded-lg p-3 text-center">
                            <p class="text-blue-600 text-xs">💧 饮水</p>
                            <p class="text-xl font-bold text-blue-700">${water}</p>
                            <p class="text-blue-500 text-xs">/ ${waterTarget} ml</p>
                        </div>
                    </div>

                    <!-- 饮食记录 -->
                    <div>
                        <h3 class="font-semibold text-gray-700 mb-2">📝 今日饮食</h3>
                        <div class="space-y-2">
                            ${foodRecords.map(f => `
                                <div class="flex justify-between items-center bg-gray-50 rounded-lg px-3 py-2">
                                    <span class="text-gray-700 text-sm truncate flex-1">${f['餐次']}: ${f['食物描述']}</span>
                                    <span class="text-gray-500 text-sm font-medium ml-2">${f['估算热量']} kcal</span>
                                </div>
                            `).join('')}
                            ${foodRecords.length === 0 ? '<p class="text-gray-400 text-sm text-center py-2">暂无记录</p>' : ''}
                        </div>
                    </div>
                </div>
                `;
            });

            document.getElementById('dashboardContent').innerHTML = html;
        }

        // 页面加载
        loadData();
        
        // 每分钟自动刷新
        setInterval(loadData, 60000);
    </script>
</body>
</html>
